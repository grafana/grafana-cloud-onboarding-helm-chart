name: Run tests

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: 'false'

      - name: Install Task
        uses: arduino/setup-task@b3bbaa05e8202d1e7bd41c46e326fc0447f2e67c
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: task install-plugins test
